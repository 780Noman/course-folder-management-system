{% extends "base.html" %}

{% block title %}Reset password &middot; Course Folder Management System{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <h1 class="text-xl font-semibold tracking-tight text-gray-900">Reset your password</h1>
      <p class="mt-1 text-sm text-gray-600">
        Enter your email and we'll send a link to reset your password.
      </p>

      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
          <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" name="{{ form.email.html_name }}" id="{{ form.email.id_for_label }}"
                 autocomplete="email" required
                 class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-ring">
        </div>
        <button type="submit"
                class="w-full cursor-pointer rounded-md bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-primary-strong focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
          Send reset link
        </button>
      </form>
      <p class="mt-4 text-center text-sm">
        <a href="{% url 'login' %}" class="cursor-pointer font-medium text-gray-600 hover:text-gray-900">Back to sign in</a>
      </p>
    </div>
  </div>
{% endblock %}
