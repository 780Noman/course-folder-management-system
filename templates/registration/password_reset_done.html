{% extends "base.html" %}

{% block title %}Check your email &middot; Course Folder Management System{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <h1 class="text-xl font-semibold tracking-tight text-gray-900">Check your email</h1>
      <p class="mt-2 text-sm text-gray-600">
        If an account exists for that email, a password-reset link has been sent.
        Follow the link to choose a new password.
      </p>
      <p class="mt-4 text-sm">
        <a href="{% url 'login' %}" class="cursor-pointer font-medium text-gray-600 hover:text-gray-900">Back to sign in</a>
      </p>
    </div>
  </div>
{% endblock %}
