{# Section heading + completeness bar. Context: label, prog (done/total/percent). #}
<div class="flex items-center justify-between">
  <h2 class="text-lg font-semibold text-foreground">{{ label }}</h2>
  <span class="text-sm text-muted-foreground">{{ prog.done }} / {{ prog.total }} required complete</span>
</div>
<div class="mt-2 h-1.5 w-full overflow-hidden rounded-full bg-muted">
  <div class="h-1.5 rounded-full bg-primary" style="width: {{ prog.percent }}%"></div>
</div>
