{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Course Folder Management System{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script src="{% static 'js/htmx.min.js' %}" defer></script>
  <script src="{% static 'js/alpine.min.js' %}" defer></script>
</head>
<body class="min-h-screen bg-background text-foreground antialiased">
  <a href="#main"
     class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-primary focus:px-4 focus:py-2 focus:text-on-primary">
    Skip to main content
  </a>
  {% block body %}
  <main id="main" class="mx-auto max-w-5xl px-4 py-8">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
          <div role="status"
               class="rounded-md border px-4 py-3 text-sm
               {% if message.tags == 'error' %}border-red-200 bg-red-50 text-red-700
               {% elif message.tags == 'success' %}border-green-200 bg-green-50 text-green-700
               {% else %}border-gray-200 bg-gray-50 text-gray-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  {% endblock %}
</body>
</html>
