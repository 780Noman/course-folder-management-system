{# Upload form for `item`. Pass `sample_kind` to upload into a W/A/B group. #}
<form method="post" enctype="multipart/form-data"
      action="{% url 'file_upload' item.pk %}" class="mt-2 flex items-center gap-2">
  {% csrf_token %}
  {% if sample_kind %}<input type="hidden" name="sample_kind" value="{{ sample_kind }}">{% endif %}
  <input type="file" name="file" required
         class="block w-full text-xs text-gray-600 file:mr-2 file:cursor-pointer file:rounded-md file:border-0 file:bg-primary file:px-3 file:py-1.5 file:text-xs file:font-medium file:text-white hover:file:bg-gray-800">
  <button type="submit"
          class="cursor-pointer rounded-md border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
    Upload
  </button>
</form>
