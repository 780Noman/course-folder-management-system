{% extends "base.html" %}

{% block title %}Password changed &middot; Course Folder Management System{% endblock %}

{% block content %}

    <div class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <h1 class="text-xl font-semibold tracking-tight text-gray-900">Password changed</h1>
      <p class="mt-2 text-sm text-gray-600">Your password has been updated. You can now sign in.</p>

      </p>
    </div>
  </div>
{% endblock %}
