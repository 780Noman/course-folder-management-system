{# Upload form for `item`. Pass `sample_kind` to upload into a W/A/B group.
   Uploads inline via HTMX, swapping just this item's evidence area. #}
<form method="post" enctype="multipart/form-data" action="{% url 'file_upload' item.pk %}"
      class="mt-2 flex items-center gap-2"
      hx-post="{% url 'file_upload' item.pk %}"
      hx-target="#evidence-{{ item.pk }}"
      hx-swap="outerHTML"
      hx-encoding="multipart/form-data">
  {% csrf_token %}
  {% if sample_kind %}<input type="hidden" name="sample_kind" value="{{ sample_kind }}">{% endif %}
  <input type="file" name="file" required
         class="block w-full text-xs text-muted-foreground file:mr-2 file:cursor-pointer file:rounded-md file:border-0 file:bg-primary file:px-3 file:py-1.5 file:text-xs file:font-medium file:text-on-primary hover:file:bg-primary-strong">
  <button type="submit"
          class="cursor-pointer rounded-md border border-border bg-card px-3 py-1.5 text-xs font-medium text-foreground hover:bg-muted focus:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
    Upload
  </button>
</form>
