{% extends "base.html" %}

{% block title %}My dashboard &middot; Course Folder Management System{% endblock %}

{% block content %}
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight text-gray-900">My dashboard</h1>
      <p class="mt-1 text-sm text-gray-600">Signed in as {{ request.user.name }} (Faculty)</p>
    </div>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit"
              class="cursor-pointer rounded-md border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2">
        Sign out
      </button>
    </form>
  </div>

  <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
    <p class="text-sm text-gray-600">Your courses and folders will appear here in later phases.</p>
  </div>
{% endblock %}
