{# Renders one uploaded file `f` as a clickable thumbnail/name chip with delete. #}
<li class="w-28">
  <a href="{% url 'file_open' f.pk %}" target="_blank" rel="noopener"
     title="{{ f.original_name }}"
     class="group flex cursor-pointer flex-col items-center gap-1 rounded-md border border-gray-200 bg-white p-2 hover:border-gray-300 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
    {% if f.thumbnail %}
      <img src="{% url 'file_thumb' f.pk %}" alt="{{ f.original_name }}" loading="lazy"
           class="h-16 w-full rounded object-cover">
    {% else %}
      <span class="flex h-16 w-full items-center justify-center rounded bg-gray-100 text-[11px] font-semibold uppercase tracking-wide text-gray-500">
        File
      </span>
    {% endif %}
    <span class="w-full truncate text-center text-[11px] text-gray-600">{{ f.original_name }}</span>
  </a>
  {% if not readonly %}
    <form method="post" action="{% url 'file_delete' f.pk %}"
          onsubmit="return confirm('Delete “{{ f.original_name|escapejs }}”?');"
          class="mt-1 text-center">
      {% csrf_token %}
      <button type="submit"
              class="cursor-pointer text-[11px] font-medium text-gray-400 hover:text-red-700 focus:outline-none">
        Delete
      </button>
    </form>
  {% endif %}
</li>
