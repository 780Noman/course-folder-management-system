{# Report filters. Export controls (Task 3) are appended below. #}
<form method="get" class="mt-6 rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
  <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
    <div>
      <label for="f-term" class="block text-xs font-medium text-gray-600">Term</label>
      <select name="term" id="f-term"
              class="mt-1 w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-ring">
        <option value="">All terms</option>
        {% for t in options.terms %}
          <option value="{{ t.pk }}" {% if selected.term_id == t.pk|stringformat:'s' %}selected{% endif %}>{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="f-program" class="block text-xs font-medium text-gray-600">Program</label>
      <select name="program" id="f-program"
              class="mt-1 w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-ring">
        <option value="">All programs</option>
        {% for p in options.programs %}
          <option value="{{ p }}" {% if selected.program == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="f-faculty" class="block text-xs font-medium text-gray-600">Faculty</label>
      <select name="faculty" id="f-faculty"
              class="mt-1 w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-ring">
        <option value="">All faculty</option>
        {% for u in options.faculty %}
          <option value="{{ u.pk }}" {% if selected.instructor_id == u.pk|stringformat:'s' %}selected{% endif %}>{{ u.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="f-status" class="block text-xs font-medium text-gray-600">Status</label>
      <select name="status" id="f-status"
              class="mt-1 w-full rounded-md border border-gray-300 px-2 py-1.5 text-sm shadow-sm focus:border-primary focus:outline-none focus:ring-1 focus:ring-ring">
        <option value="">All statuses</option>
        <option value="certified" {% if selected.status == 'certified' %}selected{% endif %}>Certified</option>
        <option value="in_review" {% if selected.status == 'in_review' %}selected{% endif %}>In review</option>
        <option value="pending" {% if selected.status == 'pending' %}selected{% endif %}>Pending</option>
      </select>
    </div>
  </div>

  <div class="mt-3 flex flex-wrap items-center gap-3">
    <button type="submit"
            class="cursor-pointer rounded-md bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-primary-strong focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
      Apply filters
    </button>
    <a href="{% url 'report' %}" class="cursor-pointer text-sm text-gray-500 hover:text-gray-900">Clear</a>

    {% block export_controls %}{% endblock %}
    <span class="ml-auto flex gap-2">
      <a href="{% url 'report_export_pdf' %}?{{ request.GET.urlencode }}"
         class="cursor-pointer rounded-md border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
        Export PDF
      </a>
      <a href="{% url 'report_export_xlsx' %}?{{ request.GET.urlencode }}"
         class="cursor-pointer rounded-md border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2">
        Export Excel
      </a>
    </span>
  </div>
</form>
