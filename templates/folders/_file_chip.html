{# One uploaded file f as a thumbnail/name chip; pass readonly=True to hide delete. #}
<li class="w-28">
  <a href="{% url 'file_open' f.pk %}" target="_blank" rel="noopener"
     title="{{ f.original_name }}"
     class="group flex cursor-pointer flex-col items-center gap-1 rounded-md border border-border bg-card p-2 hover:border-primary/40 focus:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
    {% if f.thumbnail %}
      <img src="{% url 'file_thumb' f.pk %}" alt="{{ f.original_name }}" loading="lazy"
           class="h-16 w-full rounded object-cover">
    {% else %}
      <span class="flex h-16 w-full items-center justify-center rounded bg-muted text-[11px] font-semibold uppercase tracking-wide text-muted-foreground">
        File
      </span>
    {% endif %}
    <span class="w-full truncate text-center text-[11px] text-muted-foreground">{{ f.original_name }}</span>
  </a>
  {% if not readonly %}
    <form method="post" action="{% url 'file_delete' f.pk %}"
          hx-post="{% url 'file_delete' f.pk %}"
          hx-target="#item-{{ item.pk }}"
          hx-swap="outerHTML"
          hx-confirm="Delete &ldquo;{{ f.original_name|escapejs }}&rdquo;?"
          onsubmit="return confirm('Delete “{{ f.original_name|escapejs }}”?');"
          class="mt-1 text-center">
      {% csrf_token %}
      <button type="submit"
              class="cursor-pointer text-[11px] font-medium text-muted-foreground hover:text-red-700 focus:outline-none">
        Delete
      </button>
    </form>
  {% endif %}
</li>
